<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    form {
      display: inline-block;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    input[type="text"] {
      padding: 10px;
      font-size: 1em;
      width: 200px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input[type="submit"] {
      padding: 10px 20px;
      font-size: 1em;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #0056b3;
    }

    .link-button {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background-color: #6c757d;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .link-button:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>

  <h1>🔐 Administration</h1>

  <form method="POST" action="/update-pwd">
    <label for="newpwd">Mot de passe maître :</label><br><br>
    <input type="text" id="newpwd" name="newpwd" required><br><br>
    <input type="submit" value="Mettre à jour">
  </form>

  <br><br>
  <a href="/settings" class="link-button">⬅️ Retour aux paramètres</a>

</body>
</html>
