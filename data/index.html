<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portail Connecté</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #etatPortail {
      font-size: 22px;
      margin-bottom: 30px;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
    }

    .ferme {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .ouvert {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    button {
      padding: 20px 40px;
      margin: 10px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      background-color: #007BFF;
      color: white;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    a {
      margin-top: 30px;
      font-size: 18px;
      color: #007BFF;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Contrôle du Portail</h1>

  <div id="etatPortail" class="ouvert">Lecture de l'état...</div>

  <button onclick="ouvrirPieton()">🚶 Mode Piéton</button>
  <button onclick="ouvrirVoiture()">🚗 Mode Voiture</button>

  <a href="/settings">⚙️ Paramètres</a>
  

  <script>
    function ouvrirPieton() {
      fetch('/pieton').then(response => {
        console.log("Commande piéton envoyée");
      }).catch(error => {
        alert("Erreur lors de l'envoi de la commande piéton");
      });
    }

    function ouvrirVoiture() {
      fetch('/voiture').then(response => {
        console.log("Commande voiture envoyée");
      }).catch(error => {
        alert("Erreur lors de l'envoi de la commande voiture");
      });
    }

    function majEtatPortail() {
      fetch('/etat')
        .then(response => response.text())
        .then(etat => {
          const zone = document.getElementById("etatPortail");
          if (etat.trim() === "ferme") {
            zone.textContent = "🔒 Portail fermé";
            zone.className = "ferme";
          } else {
            zone.textContent = "🚪 Portail non fermé";
            zone.className = "ouvert";
          }
        })
        .catch(() => {
          const zone = document.getElementById("etatPortail");
          zone.textContent = "❌ Erreur de lecture";
          zone.className = "ouvert";
        });
    }

    majEtatPortail();
    setInterval(majEtatPortail, 2000);
  </script>
</body>
</html>
