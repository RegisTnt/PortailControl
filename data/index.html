<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portail Connecté</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f0f0f0;
    }
    button {
      padding: 20px 40px;
      margin: 20px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      background-color: #007BFF;
      color: white;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #0056b3;
    }
    #message {
      margin-top: 20px;
      font-size: 20px;
      color: green;
      height: 1.5em;
    }
  </style>
</head>
<body>

<h1>Contrôle du Portail</h1>

<button onclick="envoyerCommande('pieton')">🚶 Mode Piéton</button>
<button onclick="envoyerCommande('voiture')">🚗 Mode Voiture</button>

<div id="message"></div>

<script>
function envoyerCommande(type) {
  fetch(`/${type}`)
    .then(response => {
      if (response.ok) {
        afficherMessage(`Commande ${type === 'pieton' ? 'Piéton' : 'Voiture'} envoyée !`);
      } else {
        afficherMessage("Erreur de communication !", true);
      }
    })
    .catch(error => {
      afficherMessage("Erreur réseau !", true);
    });
}

function afficherMessage(texte, erreur = false) {
  const message = document.getElementById("message");
  message.innerText = texte;
  message.style.color = erreur ? "red" : "green";
  setTimeout(() => {
    message.innerText = "";
  }, 3000);
}
</script>

</body>
</html>
