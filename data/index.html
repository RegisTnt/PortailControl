<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portail Connecté</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    button {
      padding: 20px 40px;
      margin: 10px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      background-color: #007BFF;
      color: white;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    a {
      margin-top: 30px;
      font-size: 18px;
      color: #007BFF;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Contrôle du Portail</h1>

  <button onclick="ouvrirPieton()">🚶 Mode Piéton</button>
  <button onclick="ouvrirVoiture()">🚗 Mode Voiture</button>

  <a href="/settings">⚙️ Paramètres</a>

  <script>
    function ouvrirPieton() {
      fetch('/pieton').then(response => {
        console.log("Commande piéton envoyée");
      }).catch(error => {
        alert("Erreur lors de l'envoi de la commande piéton");
      });
    }

    function ouvrirVoiture() {
      fetch('/voiture').then(response => {
        console.log("Commande voiture envoyée");
      }).catch(error => {
        alert("Erreur lors de l'envoi de la commande voiture");
      });
    }
  </script>
</body>
</html>
