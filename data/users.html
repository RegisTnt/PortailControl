<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Utilisateurs Enrôlés</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #007BFF;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    .btn {
      padding: 6px 12px;
      color: white;
      background-color: #dc3545;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #c82333;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
    }
    a {
      text-decoration: none;
      color: #007BFF;
    }
  </style>
</head>
<body>

<h1>Utilisateurs Enrôlés</h1>

<table>
  <thead>
    <tr><th>Nom</th><th>Token</th><th>Action</th></tr>
  </thead>
  <tbody id="userTable">
    <!-- Rempli dynamiquement -->
  </tbody>
</table>

<div class="footer">
  <a href="/">← Retour à l’accueil</a>
</div>

<script>
  fetch("/get-users")
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById("userTable");
      Object.entries(data).forEach(([user, token]) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${user}</td>
          <td>${token}</td>
          <td><button class="btn" onclick="deleteUser('${user}')">🗑️ Supprimer</button></td>
        `;
        tbody.appendChild(row);
      });
    });

  function deleteUser(username) {
    if (confirm(`Supprimer l’utilisateur ${username} ?`)) {
      window.location.href = `/delete-user?name=${encodeURIComponent(username)}`;
    }
  }
</script>
<div class="footer">
  <a href="/download-users" class="link-button">⬇️ Télécharger la liste</a>
  <br><br>
  <a href="/upload.html" class="link-button">⬆️ Restaurer une liste</a>
  <br><br>
  <a href="/">← Retour à l’accueil</a>
</div>

</body>
</html>
