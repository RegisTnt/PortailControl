; L'environnement esp32dev_ota suivi dans Git utilise portail.local.
; Avant l'upload, definir dans le terminal la meme valeur que
; PORTAL_OTA_PASSWORD dans include/config.h :
;
; $env:PORTAL_OTA_PASSWORD = "votre-mot-de-passe-local"
; pio run -e esp32dev_ota --target upload
; Remove-Item Env:PORTAL_OTA_PASSWORD
;
; Ne jamais ecrire le mot de passe reel dans ce fichier versionne.
